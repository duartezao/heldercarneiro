<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exibições, Helder Carneiro</title>
  <meta name="description" content="Explore as exibições TM Leader Contract em Portugal. Mobiliário contract para hotelaria, restauração e projetos residenciais premium." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=MuseoModerno:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .project-card {
      isolation: isolate;
    }
    .project-card__shade {
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.85) 0%,
        rgba(0, 0, 0, 0.7) 22%,
        rgba(0, 0, 0, 0.45) 42%,
        rgba(0, 0, 0, 0.18) 62%,
        transparent 80%
      );
    }
    .project-card__title {
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6), 0 1px 2px rgba(0, 0, 0, 0.6);
      letter-spacing: -0.01em;
    }
    .project-card__short {
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.7);
      color: rgba(255, 255, 255, 0.92);
    }
    .project-card__date {
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
      opacity: 0.85;
    }
    .project-card__arrow {
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body class="bg-[var(--bg-main)] text-[var(--foreground)] font-sans leading-relaxed">

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main class="pt-40 pb-20 max-w-[1200px] mx-auto px-6 md:px-10">
    <div class="text-center max-w-3xl mx-auto mb-16" data-stagger data-stagger-step="0.12">
      <h1 class="text-5xl md:text-7xl font-semibold tracking-tight mb-6 leading-[1.1]">
        Exibições
      </h1>
      <p class="text-base md:text-lg text-[var(--text-secondary)] leading-relaxed max-w-2xl mx-auto">
        As últimas exibições TM Leader Contract. Galeria, descrição, produtos em destaque e acesso ao catálogo para cada linha de mobiliário contract.
      </p>
    </div>

    <div id="projects-grid" class="grid md:grid-cols-2 gap-6 md:gap-8"></div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/exhibitions.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
