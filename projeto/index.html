<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Exibição, Hélder Carneiro</title>
  <meta name="description" content="Exibição TM Leader Contract. Hélder Carneiro, consultor oficial em Portugal." id="meta-description" />
  <link rel="canonical" href="https://www.heldercarneiro.pt/projeto/" id="canonical-link" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/assets/logo_helder_carneiro_symbol.svg" type="image/svg+xml" />
  <meta property="og:type" content="article" id="og-type" />
  <meta property="og:locale" content="pt_PT" />
  <meta property="og:site_name" content="Hélder Carneiro" />
  <meta property="og:title" content="Exibição TM Leader Contract, Hélder Carneiro" id="og-title" />
  <meta property="og:description" content="Exibição TM Leader Contract com Hélder Carneiro em Portugal." id="og-description" />
  <meta property="og:url" content="https://www.heldercarneiro.pt/projeto/" id="og-url" />
  <meta property="og:image" content="https://www.heldercarneiro.pt/assets/tm/banner-milano.webp" id="og-image" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Exibição TM Leader Contract, Hélder Carneiro" id="twitter-title" />
  <meta name="twitter:description" content="Exibição TM Leader Contract com Hélder Carneiro em Portugal." id="twitter-description" />
  <meta name="twitter:image" content="https://www.heldercarneiro.pt/assets/tm/banner-milano.webp" id="twitter-image" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=MuseoModerno:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .proj-intro {
      display: grid;
      gap: 2.5rem;
      align-items: start;
    }
    @media (min-width: 768px) {
      .proj-intro {
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: 3rem;
      }
    }
    .proj-aside__card {
      background: var(--bg-card);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    @media (min-width: 768px) {
      .proj-aside__card {
        position: sticky;
        top: 6.5rem;
        padding: 1.75rem;
      }
    }
    .proj-eyebrow {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .proj-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .proj-meta-item {
      background: var(--bg-main);
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .proj-meta-item__label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }
    .proj-meta-item__value {
      font-size: 1.0625rem;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    .proj-catalog-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 1.25rem;
      border-radius: 1rem;
      background: #000;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .proj-catalog-btn:hover {
      transform: scale(1.02);
      opacity: 0.92;
    }
    .proj-aside-block {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }
    .proj-aside-block:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
    .proj-aside-block__title {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.85rem;
    }
    .proj-materials {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .proj-materials li {
      font-size: 0.875rem;
      line-height: 1.4;
      color: var(--foreground);
      padding-left: 1rem;
      position: relative;
    }
    .proj-materials li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
    }
    .proj-products {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .proj-product-chip {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.75rem 1rem;
      border-radius: 0.875rem;
      background: var(--bg-main);
      border: 1px solid rgba(0, 0, 0, 0.06);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    a.proj-product-chip:hover {
      border-color: rgba(0, 0, 0, 0.15);
      background: #000;
      color: #fff;
    }
    a.proj-product-chip:hover .proj-product-chip__note {
      color: rgba(255, 255, 255, 0.65);
    }
    .proj-product-chip__name {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .proj-product-chip__note {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.35;
    }
    .proj-highlights {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .proj-highlights li {
      display: flex;
      gap: 0.65rem;
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    .proj-highlights li::before {
      content: "·";
      color: rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }
    .proj-section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="bg-[var(--bg-main)] text-[var(--foreground)] font-sans leading-relaxed">

  <div id="navbar-container"></div>

  <main class="pb-20">
    <div class="relative h-[70vh] w-full overflow-hidden rounded-b-[40px]">
      <img id="proj-hero" src="" alt="Imagem principal do projeto" class="w-full h-full object-cover" data-parallax="12" />
    </div>

    <div class="max-w-[1200px] mx-auto px-6 md:px-10 mt-16 proj-intro">
      <div class="proj-intro__content" data-stagger data-stagger-step="0.08">
        <p id="proj-eyebrow" class="proj-eyebrow hidden"></p>
        <h1 id="proj-title" class="text-4xl md:text-6xl mb-3 tracking-tight"></h1>
        <p id="proj-tagline" class="text-lg md:text-xl font-medium leading-snug max-w-2xl mb-4"></p>
        <p id="proj-location" class="text-[var(--text-secondary)] mb-8"></p>
        <p id="proj-desc" class="text-lg leading-relaxed max-w-2xl"></p>
        <p id="proj-desc-extra" class="text-lg leading-relaxed max-w-2xl mt-6 text-[var(--text-secondary)] hidden"></p>
        <div id="proj-highlights-wrap" class="mt-10 max-w-2xl hidden">
          <p class="proj-section-label">Destaques</p>
          <ul id="proj-highlights" class="proj-highlights"></ul>
        </div>
      </div>

      <aside class="proj-aside" data-anim="fade-left" data-anim-delay="0.1">
        <div class="proj-aside__card">
          <div class="proj-meta-grid">
            <div class="proj-meta-item">
              <p class="proj-meta-item__label">Ano</p>
              <p id="proj-year" class="proj-meta-item__value"></p>
            </div>
            <div class="proj-meta-item">
              <p class="proj-meta-item__label">Tipo</p>
              <p id="proj-duration" class="proj-meta-item__value"></p>
            </div>
          </div>
          <a
            id="proj-catalog"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="proj-catalog-btn"
          >
            <span>Ver catálogo TM</span>
            <svg class="w-4 h-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
          </a>

          <div id="proj-materials-wrap" class="proj-aside-block hidden">
            <p class="proj-aside-block__title">Materiais</p>
            <ul id="proj-materials" class="proj-materials"></ul>
          </div>

          <div id="proj-products-wrap" class="proj-aside-block hidden">
            <p class="proj-aside-block__title">Produtos em destaque</p>
            <ul id="proj-products" class="proj-products"></ul>
          </div>
        </div>
      </aside>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 md:px-10 mt-16 grid md:grid-cols-2 gap-6" data-stagger data-stagger-step="0.12">
      <figure class="rounded-3xl overflow-hidden md:col-span-2 aspect-[16/8] m-0">
        <img id="proj-img-1" src="" alt="" class="w-full h-full object-cover" />
        <figcaption id="proj-cap-1" class="mt-3 text-sm text-[var(--text-secondary)] leading-relaxed hidden"></figcaption>
      </figure>
      <figure class="rounded-3xl overflow-hidden aspect-[4/3] m-0">
        <img id="proj-img-2" src="" alt="" class="w-full h-full object-cover" />
        <figcaption id="proj-cap-2" class="mt-3 text-sm text-[var(--text-secondary)] leading-relaxed hidden"></figcaption>
      </figure>
      <figure class="rounded-3xl overflow-hidden aspect-[4/3] m-0">
        <img id="proj-img-3" src="" alt="" class="w-full h-full object-cover" />
        <figcaption id="proj-cap-3" class="mt-3 text-sm text-[var(--text-secondary)] leading-relaxed hidden"></figcaption>
      </figure>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 md:px-10 mt-20 reveal">
      <div class="bg-[var(--bg-card)] rounded-[48px] p-12 md:p-16 text-center">
        <h2 class="text-3xl md:text-4xl mb-6 max-w-2xl mx-auto">Interessado nesta exibição? Entre em contacto para receber o catálogo completo e apoio na especificação do seu projeto.</h2>
        <a href="/contactos/" class="inline-flex items-center gap-3 rounded-full font-medium transition-transform hover:scale-[1.02] bg-black text-white px-7 py-3">
          <span>Contactar</span>
        </a>
      </div>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 md:px-10 mt-16 flex justify-between reveal">
      <a id="link-prev" href="#" class="inline-flex items-center gap-3 hover:opacity-70 transition">
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <div class="text-left">
          <p class="text-xs text-[var(--text-secondary)]">Anterior</p>
          <p id="prev-title" class="font-medium"></p>
        </div>
      </a>
      <a id="link-next" href="#" class="inline-flex items-center gap-3 hover:opacity-70 transition text-right">
        <div>
          <p class="text-xs text-[var(--text-secondary)]">Seguinte</p>
          <p id="next-title" class="font-medium"></p>
        </div>
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </a>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js" defer></script>
  <script src="/js/seo.js" defer></script>
  <script src="/js/components.js" defer></script>
  <script src="/js/responsive-images.js" defer></script>
  <script src="/js/exhibitions.js" defer></script>
  <script src="/js/main.js" defer></script>
  <script src="/js/project.js" defer></script>
</body>
</html>
